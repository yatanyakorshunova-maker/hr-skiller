name: Keep Streamlit App Alive

on:
  schedule:
    # Запуск каждый час (надёжнее)
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  wake-app:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Streamlit App
        run: |
          APP_URL="https://hr-skiller-4fna6myyn4ja2ftgbcob3y.streamlit.app"
          echo "🌐 Пробуждаем: $APP_URL"
          
          # Эмулируем настоящий браузер, чтобы Streamlit "проснулся"
          curl -L -s -o /dev/null \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
            -H "Accept-Language: ru-RU,ru;q=0.8,en-US;q=0.5,en;q=0.3" \
            -H "Connection: keep-alive" \
            -H "Upgrade-Insecure-Requests: 1" \
            "$APP_URL"
          
          echo "✅ Запрос отправлен"
